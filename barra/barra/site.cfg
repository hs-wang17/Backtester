[default]
libraries = flame, blis
library_dirs = /opt/AMD/aocl/aocl-linux-aocc-5.1.0/amd-libflame/lib/LP64:/opt/AMD/aocl/aocl-linux-aocc-5.1.0/amd-blis/lib/LP64
include_dirs = /opt/AMD/aocl/aocl-linux-aocc-5.1.0/amd-blis/include:/opt/AMD/aocl/aocl-linux-aocc-5.1.0/amd-libflame/include

[aocc]
extra_compile_args = -march=znver3 -O3 -fopenmp
extra_link_args = -fopenmp

[blas]
blas_libs = blis
[lapack]
lapack_libs = flame
